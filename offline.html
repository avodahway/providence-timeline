<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#183c39">
  <title>Providence Timeline Offline</title>
  <style>
    :root{--paper:#f6f0e7;--vellum:#fffdf7;--ink:#222a27;--muted:#6e746f;--chapel:#183c39;--gold:#b99a4f}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#fffdf7,var(--paper));color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{width:min(520px,calc(100% - 32px));padding:34px;border:1px solid rgba(24,60,57,.12);border-radius:8px;background:rgba(255,253,247,.82);box-shadow:0 24px 70px rgba(24,60,57,.1);text-align:center}
    img{width:82px;height:82px;object-fit:cover;border-radius:8px;margin-bottom:18px}
    h1{margin:0;color:var(--chapel);font-family:Georgia,Cambria,"Times New Roman",serif;font-size:2.2rem;font-weight:500}
    p{margin:14px 0 0;color:var(--muted);line-height:1.7}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;margin-top:22px;padding:9px 14px;border:1px solid var(--chapel);border-radius:6px;background:var(--chapel);color:#fff;text-decoration:none;font-weight:780}
  </style>
</head>
<body>
  <main>
    <img src="/icons/providence-icon-192.png" alt="">
    <h1>Your journal is waiting.</h1>
    <p>Providence Timeline is having trouble reaching the network. Reconnect when you can, then return to the page you were opening.</p>
    <a href="/">Return to Providence Timeline</a>
  </main>
</body>
</html>
